plugins {
    id 'java'
    id 'application'
}


group = 'com.codefactor.challenge'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17) // or 11 if you prefer
    }
}

application {
    mainClass = 'com.codefactor.challenge.one_week.DayTwo_Challenge01_Sol'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation(platform("org.junit:junit-bom:5.10.0"))
    testImplementation("org.junit.jupiter:junit-jupiter")
    testRuntimeOnly("org.junit.platform:junit-platform-launcher")
}

tasks.test {
    useJUnitPlatform()
}